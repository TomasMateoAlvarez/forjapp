name: Forja
options:
  bundleIdPrefix: com.forja
  deploymentTarget:
    iOS: "17.0"
targets:
  Forja:
    type: application
    platform: iOS
    sources: [Forja]
    info:
      path: Forja/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forja.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
