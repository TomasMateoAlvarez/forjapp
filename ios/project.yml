name: Forja
options:
  bundleIdPrefix: com.forja
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  Forja:
    type: application
    platform: iOS
    sources: [Forja]
    info:
      path: Forja/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        API_BASE_URL: "$(API_BASE_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forja.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
